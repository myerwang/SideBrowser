<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SideBrowser Error Demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111827;
        color: #f9fafb;
        font-family: "Segoe UI", sans-serif;
      }

      main {
        width: min(680px, calc(100vw - 48px));
        padding: 24px;
        border-radius: 16px;
        background: #1f2937;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin-top: 0;
      }

      button {
        margin-top: 16px;
        padding: 10px 14px;
        border: 0;
        border-radius: 10px;
        background: #f59e0b;
        color: #111827;
        font: inherit;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SideBrowser Error Demo</h1>
      <p id="status">This page intentionally throws script errors for testing.</p>
      <button id="trigger-error" type="button">Trigger another error</button>
    </main>

    <script>
      console.log("error-demo.html booting");

      window.addEventListener("load", () => {
        document.getElementById("status").textContent =
          "Open DevTools or use SideBrowser diagnostics to inspect the failures.";

        setTimeout(() => {
          console.log("Triggering intentional ReferenceError");
          missingFunctionCall("boom");
        }, 250);

        Promise.reject(new Error("Intentional unhandled rejection from error-demo.html"));
      });

      document.getElementById("trigger-error").addEventListener("click", () => {
        throw new Error("Intentional click error from error-demo.html");
      });
    </script>
  </body>
</html>
